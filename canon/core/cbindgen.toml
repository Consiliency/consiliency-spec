# cbindgen config for the canon-core C ABI (`c-binding` feature -> include/canon_core.h).
# Generate with:  cbindgen --config canon/core/cbindgen.toml --crate canon-core \
#                          --output canon/core/include/canon_core.h canon/core
# The header is the artifact the Dart `dart:ffi` layer binds against (IF-0-DABI-1).

language = "C"
include_guard = "CANON_CORE_H"
pragma_once = true
autogen_warning = "/* Generated by cbindgen from the canon-core `c-binding` feature. DO NOT EDIT. */"
cpp_compat = true
style = "type"

[parse]
parse_deps = false

[export]
# Only the C ABI surface is exported; the internal Rust types stay hidden.
include = [
    "canon_canonical_bytes_from_json",
    "canon_digest_from_json",
    "canon_bytes_free",
    "canon_string_free",
    "CANON_OK",
    "CANON_ERR",
]
prefix = ""
